<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Langham, Pasadena - Event Profitability + Displacement Suite</title>
  
  <!-- Premium Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <!-- Local self-contained React and ReactDOM dependencies (for 100% offline access) -->
  <script src="react.production.min.js"></script>
  <script src="react-dom.production.min.js"></script>

  <!-- Local self-contained Babel Standalone (for 100% offline access) -->
  <script src="babel.min.js"></script>

  <!-- Style reset and page load animation -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #FAF7F2;
      font-family: 'Lato', sans-serif;
    }
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;

</head>
<body>
  <!-- Elegant Loading Screen -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">The Langham, Pasadena</div>
  </div>

  <div id="root"></div>

  <!-- Load and Compile App.jsx with Babel Standalone -->
  <script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ---------------------------------------------------------------------------
// Langham brand palette
// ---------------------------------------------------------------------------
const LANG_PINK       = "#E8839B";
const LANG_PINK_LIGHT = "#FAE8EE";
const LANG_PINK_MID   = "#F2A7BB";
const LANG_DARK       = "#2C2420";
const LANG_DARK2      = "#1A1210";
const LANG_MID        = "#6B5C52";
const LANG_GOLD       = "#B89A6A";
const LANG_IVORY      = "#FAF7F2";
const LANG_CREAM      = "#F5F0E8";
const LANG_BORDER     = "#EAE2D8";
const GO_GREEN        = "#2D7A5F";
const NO_RED          = "#C04A5E";

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
const fmt$ = (v) => new Intl.NumberFormat("en-US", { style:"currency", currency:"USD", maximumFractionDigits:0 }).format(v || 0);
const fmtPct = (v) => `${(v || 0).toFixed(1)}%`;

const dateRange = (start, end) => {
  const dates = [];
  const s = new Date(start + "T12:00:00");
  const e = new Date(end   + "T12:00:00");
  for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
    dates.push(d.toISOString().split("T")[0]);
  }
  return dates;
};

const dayName = (dateStr) =>
  new Date(dateStr + "T12:00:00").toLocaleDateString("en-US", { weekday:"long" });

// ---------------------------------------------------------------------------
// Dynamic Holiday Registry (2026)
// ---------------------------------------------------------------------------
const HOLIDAYS_2026 = [
  { name: "Valentine's Day", start: "2026-02-14", end: "2026-02-14" },
  { name: "Easter Weekend", start: "2026-04-03", end: "2026-04-04" },
  { name: "Mother's Day", start: "2026-05-08", end: "2026-05-09" },
  { name: "Memorial Day Weekend", start: "2026-05-22", end: "2026-05-24" },
  { name: "July 4th", start: "2026-07-03", end: "2026-07-05" },
  { name: "Labor Day", start: "2026-09-04", end: "2026-09-06" },
  { name: "Mex Ind Day", start: "2026-09-15", end: "2026-09-15" },
  { name: "Columbus / Indigenous Peoples Day", start: "2026-10-09", end: "2026-10-10" },
  { name: "Veterans Day Weekend", start: "2026-11-11", end: "2026-11-12" },
  { name: "Thanksgiving Break", start: "2026-11-25", end: "2026-11-28" },
  { name: "Christmas Break", start: "2026-12-24", end: "2026-12-29" },
  { name: "Rose Bowl", start: "2026-12-30", end: "2027-01-01" },
];

const isDateHoliday = (dateStr) => {
  if (!dateStr) return false;
  const d = new Date(dateStr + "T12:00:00");
  return HOLIDAYS_2026.some(h => {
    const start = new Date(h.start + "T12:00:00");
    const end = new Date(h.end + "T12:00:00");
    return d >= start && d <= end;
  });
};

const EVENT_TYPES = [
  "Gala / Banquet","Corporate Conference","Wedding",
  "Product Launch","Board Meeting","Social Reception","Hybrid Event",
];

// ---------------------------------------------------------------------------
// Defaults
// ---------------------------------------------------------------------------
const EVENT_DEFAULTS = {
  eventName:       "Grand Gala Dinner",
  eventType:       "Gala / Banquet",
  startDate:       "2026-05-22",
  endDate:         "2026-05-26",
  // Financials
  groupADR:        450,
  fbRevenue:       3800,
  avRevenue:       848,
  miscRevenue:     3200,
  staffCost:       1200,
  fbCost:          1500,
  bundledCost:     210,
  // Parking
  excessParking:   false,
  parkingDays:     1,
  daytimePasses:   0,
  overnightPasses: 0,
  amenityDiscount: 0,
  parkingDiscount: 0,
  leisureADRKnown: false,
};

// ---------------------------------------------------------------------------
// UI Primitives
// ---------------------------------------------------------------------------
const SectionLabel = ({ children }) => (
  <div style={{ display:"flex", alignItems:"center", gap:12, margin:"26px 0 14px" }}>
    <span style={{ fontSize:11, letterSpacing:3, textTransform:"uppercase", color:LANG_PINK,
      fontFamily:"'Playfair Display',serif", fontWeight:600 }}>{children}</span>
    <div style={{ flex:1, height:1, background:`linear-gradient(to right,${LANG_PINK}60,transparent)` }} />
  </div>
);

const Field = ({ label, value, onChange, type="text", prefix, options, note, disabled }) => (
  <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
    <label style={{ fontSize:11, letterSpacing:1.5, textTransform:"uppercase", color:LANG_MID,
      fontFamily:"'Lato',sans-serif", fontWeight:600 }}>{label}</label>
    <div style={{ position:"relative" }}>
      {prefix && <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)",
        color:LANG_GOLD, fontSize:14, fontWeight:700 }}>{prefix}</span>}
      {options ? (
        <select value={value} onChange={e => onChange(e.target.value)} disabled={disabled}
          style={{ width:"100%", padding:"10px 13px", border:`1px solid ${LANG_BORDER}`, borderRadius:8,
            fontSize:14, color:LANG_DARK, background:"#fff", appearance:"none", cursor:"pointer",
            outline:"none", boxSizing:"border-box" }}>
          {options.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      ) : type === "checkbox" ? (
        <input type="checkbox" checked={!!value} onChange={e => onChange(e.target.checked)}
          style={{ width:18, height:18, cursor:"pointer", accentColor:LANG_PINK }} />
      ) : (
        <input type={type} value={value} disabled={disabled}
          onChange={e => onChange(type === "number" ? parseFloat(e.target.value) || 0 : e.target.value)}
          style={{ width:"100%", padding:prefix?"10px 13px 10px 28px":"10px 13px",
            border:`1px solid ${LANG_BORDER}`, borderRadius:8, fontSize:14, color:LANG_DARK,
            background: disabled ? LANG_CREAM : "#fff", boxSizing:"border-box", outline:"none" }} />
      )}
    </div>
    {note && <span style={{ fontSize:11, color:"#A09080" }}>{note}</span>}
  </div>
);

// ---------------------------------------------------------------------------
// Night-by-night room table (input)
// ---------------------------------------------------------------------------
const NightRoomTable = ({ dates, roomsMap, onRoomsChange }) => (
  <div className="responsive-table-wrapper" style={{ border:`1px solid ${LANG_BORDER}`, borderRadius:10, overflow:"hidden" }}>
    <table className="responsive-table" style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
      <thead>
        <tr style={{ background:LANG_CREAM }}>
          {["Date","Day","Holiday","Group Rooms Needed"].map(h => (
            <th key={h} style={{ padding:"10px 14px", textAlign:"left", fontSize:11,
              letterSpacing:1.5, textTransform:"uppercase", color:LANG_MID, fontWeight:600,
              borderBottom:`1px solid ${LANG_BORDER}` }}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {dates.map((date, i) => (
          <tr key={date} style={{ background: i % 2 === 0 ? "#fff" : LANG_IVORY,
            borderBottom:`1px solid ${LANG_BORDER}` }}>
            <td style={{ padding:"10px 14px", color:LANG_DARK, fontWeight:600 }}>
              {new Date(date + "T12:00:00").toLocaleDateString("en-US",{month:"short", day:"numeric"})}
            </td>
            <td style={{ padding:"10px 14px", color:LANG_MID }}>{dayName(date)}</td>
            <td style={{ padding:"10px 14px", color:LANG_MID }}>{isDateHoliday(date) ? "Yes" : "—"}</td>
            <td style={{ padding:"10px 14px" }}>
              <input type="number" value={roomsMap[date] ?? 10}
                onChange={e => onRoomsChange(date, parseFloat(e.target.value) || 0)}
                style={{ width:90, padding:"6px 10px", border:`1px solid ${LANG_BORDER}`,
                  borderRadius:6, fontSize:14, color:LANG_DARK, outline:"none",
                  fontFamily:"'Lato',sans-serif" }} />
            </td>
          </tr>
        ))}
      </tbody>
    </table>
  </div>
);

// ---------------------------------------------------------------------------
// Model status badge
// ---------------------------------------------------------------------------
const ModelBadge = ({ status, metrics }) => {
  const cfg = {
    idle:    { bg:LANG_CREAM,    border:LANG_BORDER, dot:LANG_MID,  text:"Model ready — update inputs to run" },
    loading: { bg:"#FFF8E8",    border:LANG_GOLD,   dot:LANG_GOLD, text:"Running regression model…" },
    ready:   { bg:"#EAF5EF",    border:GO_GREEN,    dot:GO_GREEN, text:"Model active" },
    error:   { bg:"#FFF3E8",    border:LANG_GOLD,   dot:LANG_GOLD, text:"API unavailable — using historical benchmarks" },
  }[status] || {};

  return (
    <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 16px",
      background:cfg.bg, border:`1px solid ${cfg.border}`, borderRadius:8, marginBottom:14 }}>
      <div style={{ width:8, height:8, borderRadius:"50%", background:cfg.dot, flexShrink:0,
        animation: status === "loading" ? "pulse 1s ease-in-out infinite" : "none" }} />
      <span style={{ fontSize:12, letterSpacing:0.5, color:LANG_MID }}>{cfg.text}</span>
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}`}</style>
    </div>
  );
};

// ---------------------------------------------------------------------------
// Nightly breakdown table (output)
// ---------------------------------------------------------------------------
const BreakdownTable = ({ nights, groupADR, fbRevenue, avRevenue, miscRevenue,
                          staffCost, fbCost, bundledCost, parkingCost, netAmenityFee = 0, netParkingRev = 0 }) => {
  if (!nights || nights.length === 0) return null;

  const n = nights.length;

  // Split financials proportionally by group_rooms
  const totalGroupRooms = nights.reduce((s, r) => s + r.group_rooms, 0);

  return (
    <div className="responsive-table-wrapper" style={{ overflowX:"auto" }}>
      <table className="responsive-table" style={{ width:"100%", borderCollapse:"collapse", fontSize:13, fontFamily:"'Lato',sans-serif" }}>
        <thead>
          <tr style={{ background:LANG_CREAM, borderBottom:`2px solid ${LANG_BORDER}` }}>
            {[
              "Date","Day","Holiday",
              "Pred. LCR",
              nights.some(r => r.is_manual_adr) ? "Leisure ADR" : "Pred. ADR",
              "Pred. F&B/Night",
              "Est. Leisure Profit / Night",
              "Group Profit / Night",
              "Daily Displacement Value",
            ].map(h => (
              <th key={h} style={{ padding:"10px 12px", textAlign:"left", fontSize:11,
                letterSpacing:1.2, textTransform:"uppercase", color:LANG_MID, fontWeight:600,
                whiteSpace:"nowrap" }}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {nights.map((r, i) => {
            // Group Profit for this night (proportional by room count)
            const roomShare = totalGroupRooms > 0 ? r.group_rooms / totalGroupRooms : 1 / n;

            // Room revenue contribution this night
            const nightRoomRev = groupADR * r.group_rooms;
            // Apply proportional share of ancillary & costs
            const nightFB     = fbRevenue   * roomShare;
            const nightAV     = avRevenue   * roomShare;
            const nightMisc   = miscRevenue * roomShare;
            const nightStaff  = staffCost   * roomShare;
            const nightFBCost = fbCost      * roomShare;
            const nightBundled= bundledCost * roomShare;
            const nightParking= parkingCost * roomShare;

            const nightAmenity = netAmenityFee * roomShare;
            const nightParkingRev = netParkingRev * roomShare;

            // Formula: (GroupADR-150)*rooms + 0.2*F&B + AV + Misc + Amenity + ParkingRev - Staff - FBCost - Bundled - Parking
            const groupProfitNight =
              (groupADR - 150) * r.group_rooms +
              (0.2 * nightFB) +
              nightAV + nightMisc +
              nightAmenity + nightParkingRev -
              nightStaff - nightFBCost - nightBundled - nightParking;

            // Est. Leisure Profit for this night (what the model says we'd earn)
            // = LCR * rooms * adj_rev_per_room  (already computed as night_contribution)
            const leisureProfitNight = r.night_contribution;

            // Daily Displacement Value = leisure profit - group profit
            const dailyDisp = leisureProfitNight - groupProfitNight;
            const dispColor = dailyDisp > 0 ? NO_RED : GO_GREEN;

            return (
              <tr key={i} style={{ borderBottom:`1px solid ${LANG_BORDER}`,
                background: i % 2 === 0 ? "#fff" : LANG_IVORY }}>
                <td style={{ padding:"11px 12px", color:LANG_DARK, fontWeight:600 }}>
                  {new Date(r.date + "T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}
                </td>
                <td style={{ padding:"11px 12px", color:LANG_MID }}>{r.day_of_week}</td>
                <td style={{ padding:"11px 12px", color:LANG_MID }}>{r.is_holiday ? "Yes" : "—"}</td>
                <td style={{ padding:"11px 12px", fontFamily:"'Playfair Display',serif",
                  fontWeight:700, color:LANG_DARK }}>{fmtPct(r.predicted_lcr * 100)}</td>
                <td style={{ padding:"11px 12px", fontFamily:"'Playfair Display',serif",
                  color:LANG_GOLD, display: "flex", alignItems: "center", gap: 6 }}>
                  {fmt$(r.predicted_adr)}
                  {r.is_manual_adr && (
                    <span style={{ fontSize: 9, letterSpacing: 0.5, textTransform: "uppercase", background: LANG_CREAM, color: LANG_GOLD, padding: "2px 6px", borderRadius: 4, fontWeight: 700, border: `1px solid ${LANG_BORDER}`, display: "inline-block" }}>
                      Manual
                    </span>
                  )}
                </td>
                <td style={{ padding:"11px 12px", fontFamily:"'Playfair Display',serif",
                  color:LANG_GOLD }}>{fmt$(r.predicted_fnb)}</td>
                <td style={{ padding:"11px 12px", fontFamily:"'Playfair Display',serif",
                  fontWeight:700, color:NO_RED }}>{fmt$(leisureProfitNight)}</td>
                <td style={{ padding:"11px 12px", fontFamily:"'Playfair Display',serif",
                  fontWeight:700, color:LANG_DARK }}>{fmt$(groupProfitNight)}</td>
                <td style={{ padding:"11px 12px", fontFamily:"'Playfair Display',serif",
                  fontWeight:700, color:dispColor }}>
                  {dailyDisp > 0 ? "+" : ""}{fmt$(dailyDisp)}
                </td>
              </tr>
            );
          })}
        </tbody>
        <tfoot>
          <tr style={{ background:LANG_CREAM, borderTop:`2px solid ${LANG_BORDER}` }}>
            <td colSpan={6} style={{ padding:"12px", fontSize:12, letterSpacing:1.5,
              textTransform:"uppercase", color:LANG_MID, fontWeight:700 }}>TOTALS</td>
            <td style={{ padding:"12px", fontFamily:"'Playfair Display',serif", fontWeight:700,
              color:NO_RED, fontSize:15 }}>
              {fmt$(nights.reduce((s, r) => s + r.night_contribution, 0))}
            </td>
            <td style={{ padding:"12px", fontFamily:"'Playfair Display',serif", fontWeight:700,
              color:LANG_DARK, fontSize:15 }}>—</td>
            <td style={{ padding:"12px", fontFamily:"'Playfair Display',serif", fontWeight:700,
              fontSize:15,
              color: nights.reduce((s,r)=>s+r.night_contribution,0) > 0 ? NO_RED : GO_GREEN }}>
              Net on breakdown
            </td>
          </tr>
        </tfoot>
      </table>
    </div>
  );
};

// ---------------------------------------------------------------------------
// Dynamic Active Booking Selector
// ---------------------------------------------------------------------------
const BookingSelector = ({ activeEventName, historyList, onLoadBooking }) => {
  if (!historyList || historyList.length === 0) {
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14, background: LANG_CREAM, padding: "8px 14px", borderRadius: 8, border: `1px solid ${LANG_BORDER}`, maxWidth: "max-content" }}>
        <span style={{ fontSize: 11, letterSpacing: 1, textTransform: "uppercase", color: LANG_MID, fontWeight: 700 }}>
          Viewing Proposal:
        </span>
        <span style={{ fontSize: 13.5, color: LANG_DARK, fontWeight: 700, fontFamily: "'Playfair Display', serif" }}>
          {activeEventName} (Unsaved)
        </span>
      </div>
    );
  }

  const isCurrentSaved = historyList.some(
    b => b.eventName.toLowerCase().trim() === activeEventName.toLowerCase().trim()
  );

  return (
    <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 12, marginBottom: 14, background: LANG_CREAM, padding: "8px 14px", borderRadius: 8, border: `1px solid ${LANG_BORDER}`, maxWidth: "max-content" }}>
      <span style={{ fontSize: 11, letterSpacing: 1, textTransform: "uppercase", color: LANG_MID, fontWeight: 700 }}>
        Viewing Proposal:
      </span>
      <div style={{ position: "relative", display: "inline-block" }}>
        <select 
          value={activeEventName}
          onChange={(e) => {
            const selectedName = e.target.value;
            const booking = historyList.find(b => b.eventName === selectedName);
            if (booking) {
              onLoadBooking(booking);
            }
          }}
          style={{
            padding: "6px 28px 6px 12px",
            border: `1.5px solid ${LANG_GOLD}`,
            borderRadius: 6,
            fontSize: 13.5,
            fontWeight: 700,
            color: LANG_DARK,
            background: "#fff",
            cursor: "pointer",
            outline: "none",
            fontFamily: "'Playfair Display', serif",
            appearance: "none",
            WebkitAppearance: "none",
            MozAppearance: "none"
          }}
        >
          {!isCurrentSaved && (
            <option value={activeEventName}>
              {activeEventName} (Active Unsaved)
            </option>
          )}
          {historyList.map(b => (
            <option key={b.eventName} value={b.eventName}>
              {b.eventName}
            </option>
          ))}
        </select>
        <span style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", pointerEvents: "none", fontSize: 8, color: LANG_GOLD }}>
          ▼
        </span>
      </div>
    </div>
  );
};

// ---------------------------------------------------------------------------
// Main component
// ---------------------------------------------------------------------------
function HotelProfitabilityTool() {
  const [event, setEvent]   = useState(EVENT_DEFAULTS);
  const [roomsMap, setRoomsMap] = useState({ "2026-05-22": 10, "2026-05-23": 10, "2026-05-24": 10, "2026-05-25": 5, "2026-05-26": 2 });
  const [leisureADRMap, setLeisureADRMap] = useState({ "2026-05-22": 420, "2026-05-23": 420, "2026-05-24": 420, "2026-05-25": 420, "2026-05-26": 420 });
  const [tab, setTab]       = useState("home");
  const [mounted, setMounted] = useState(false);

  // Sales Rep States
  const [repName, setRepName] = useState(() => {
    try {
      return sessionStorage.getItem("langham_rep_name") || "";
    } catch (e) {
      return "";
    }
  });
  const [historyList, setHistoryList] = useState([]);
  const [showWelcomeModal, setShowWelcomeModal] = useState(false);
  const [saveFeedback, setSaveFeedback] = useState("");

  const [modelStatus,  setModelStatus]  = useState("idle");
  const [modelResult,  setModelResult]  = useState(null);

  useEffect(() => { setMounted(true); }, []);

  const setE = k => v => setEvent(p => ({ ...p, [k]: v }));

  // Sales Rep Handlers
  const handleSaveRepName = (name) => {
    try {
      sessionStorage.setItem("langham_rep_name", name);
      setRepName(name);
    } catch (e) {
      console.error("Failed to save rep name", e);
    }
  };

  const handleSwitchRep = () => {
    try {
      sessionStorage.removeItem("langham_rep_name");
      setRepName("");
      setEvent(EVENT_DEFAULTS);
      setRoomsMap({ "2026-05-22": 10, "2026-05-23": 10, "2026-05-24": 10, "2026-05-25": 5, "2026-05-26": 2 });
      setLeisureADRMap({ "2026-05-22": 420, "2026-05-23": 420, "2026-05-24": 420, "2026-05-25": 420, "2026-05-26": 420 });
      setTab("home");
    } catch (e) {
      console.error("Failed to clear rep session", e);
    }
  };

  const handleLoadBooking = (booking, targetTab = "inputs") => {
    if (booking.eventState) setEvent(booking.eventState);
    if (booking.roomsMapState) setRoomsMap(booking.roomsMapState);
    if (booking.leisureADRMapState) setLeisureADRMap(booking.leisureADRMapState);
    if (targetTab) setTab(targetTab);
  };

  const handleSaveBooking = () => {
    if (!repName) return;

    const key = `langham_bookings_${repName}`;
    let list = [];
    try {
      const stored = localStorage.getItem(key);
      list = stored ? JSON.parse(stored) : [];
    } catch (e) {
      list = [];
    }

  const totalGroupRooms = dates.reduce((s, d) => s + (roomsMap[d] ?? 10), 0);

          nights:               buildNights(),
          group_profit:         groupProfit,
          excess_parking_days:  event.excessParking ? event.parkingDays : 0,
        }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      setModelResult(data);
      setModelStatus("ready");
    } catch (err) {

      const FALLBACK = { lcr: 0.74, adr: 420, fnb: 85 };

        const adj = (FALLBACK.adr - 150) + (FALLBACK.fnb * 0.2);

          predicted_lcr:       FALLBACK.lcr,

          predicted_fnb:       FALLBACK.fnb,
          adj_rev_per_room:    adj,
          night_contribution:  FALLBACK.lcr * n.group_rooms * adj,

      setModelResult({

        total_displacement:    totalDisp,
        parking_cost:          parkingCost,
        adjusted_group_profit: groupProfit,
        displacement_value:    totalDisp - groupProfit,
        verdict:               totalDisp - groupProfit < 0 ? "Book the group" : "Decline the group",

      setModelStatus("error");

                    max="100" 
                    step="5" 
                    value={event.amenityDiscount || 0} 
                    onChange={e => setE("amenityDiscount")(parseInt(e.target.value) || 0)} 
                    style={{ width: "100%", accentColor: LANG_PINK, cursor: "pointer", height: 6, borderRadius: 3, background: LANG_BORDER, outline: "none" }} 
                  />
                  <div style={{ fontSize: 11, color: "#A09080", display: "flex", justifyContent: "space-between" }}>
                    <span>0% (No discount)</span>
                    <span>100% (Complimentary)</span>
                  </div>
                </div>

                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <label style={{ fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", color: LANG_MID, fontFamily: "'Lato',sans-serif", fontWeight: 600 }}>
                      Parking Fee Discount
                    </label>
                    <span style={{ fontSize: 14, fontWeight: 700, color: LANG_PINK, fontFamily: "'Playfair Display', serif" }}>
                      {event.parkingDiscount || 0}% Off
                    </span>
                  </div>
                  <input 
                    type="range" 
                    min="0" 
                    max="100" 
                    step="5" 
                    value={event.parkingDiscount || 0} 
                    onChange={e => setE("parkingDiscount")(parseInt(e.target.value) || 0)} 
                    style={{ width: "100%", accentColor: LANG_PINK, cursor: "pointer", height: 6, borderRadius: 3, background: LANG_BORDER, outline: "none" }} 
                  />
                  <div style={{ fontSize: 11, color: "#A09080", display: "flex", justifyContent: "space-between" }}>
                    <span>0% (No discount)</span>
                    <span>100% (Complimentary)</span>
                  </div>
                </div>
              </div>

              <SectionLabel>Parking</SectionLabel>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <Field label="Excess Parking Required?" value={event.excessParking} onChange={setE("excessParking")} type="checkbox" />
                <span style={{ fontSize:13, color:LANG_MID, paddingTop:2 }}>$8,000 per day deducted from group profit</span>
              </div>
              {event.excessParking && (
                <div style={{ marginTop:12, maxWidth:200 }}>
                  <Field label="Number of Parking Days" value={event.parkingDays} onChange={setE("parkingDays")} type="number"
                    note={`Total deduction: ${fmt$(event.parkingDays * 8000)}`} />
                </div>
              )}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:12 }}>
                <Field label="Daytime Passes ($25/ea)" value={event.daytimePasses || 0} onChange={setE("daytimePasses")} type="number"
                  note="6 AM - 9 PM daytime parking" />
                <Field label="Overnight Passes ($50/ea)" value={event.overnightPasses || 0} onChange={setE("overnightPasses")} type="number"
                  note="Overnight parking passes" />
              </div>

              {/* Profit preview */}
              <div style={{ marginTop:22, padding:"16px 18px", background:LANG_PINK_LIGHT,
                borderRadius:10, fontSize:13, color:LANG_MID, lineHeight:1.8 }}>
                <div style={{ fontWeight:700, color:LANG_DARK, marginBottom:4 }}>Calculated Group Profit Preview</div>
                <div>(Group ADR − $150) × {totalGroupRooms} rooms = {fmt$((event.groupADR-150)*totalGroupRooms)}</div>
                <div>+ 20% F&B = {fmt$(0.2*event.fbRevenue)}</div>
                <div>+ AV + Misc = {fmt$(event.avRevenue+event.miscRevenue)}</div>
                <div>
                  + Amenity Fee = {fmt$(baseAmenityFee)} 
                  {event.amenityDiscount > 0 && ` (−${event.amenityDiscount}% concession = ${fmt$(netAmenityFee)})`}
                </div>
                <div>
                  + Parking Rev. = {fmt$(baseParkingRev)} 
                  {event.parkingDiscount > 0 && ` (−${event.parkingDiscount}% concession = ${fmt$(netParkingRev)})`}
                </div>
                <div>− Costs = {fmt$(event.staffCost+event.fbCost+event.bundledCost)}</div>
                {parkingCost > 0 && <div>− Excess Parking Cost = {fmt$(parkingCost)}</div>}
                <div style={{ borderTop:`1px solid ${LANG_BORDER}`, marginTop:6, paddingTop:6,
                  fontWeight:700, color:groupProfit>=0?GO_GREEN:NO_RED }}>
                  = {fmt$(groupProfit)}
                </div>
              </div>

              {/* Manual Save Button */}
              <div style={{ marginTop: 20, display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
                <button
                  onClick={handleSaveBooking}
                  style={{
                    padding: "12px 24px",
                    background: LANG_PINK,
                    color: "#fff",
                    border: "none",
                    borderRadius: 8,
                    fontSize: 13,
                    fontWeight: 700,
                    letterSpacing: 1.5,
                    textTransform: "uppercase",
                    cursor: "pointer",
                    transition: "all 0.2s",
                    fontFamily: "'Lato', sans-serif"
                  }}
                  onMouseEnter={(e) => e.target.style.background = LANG_PINK_MID}
                  onMouseLeave={(e) => e.target.style.background = LANG_PINK}
                >
                  Save Booking Info
                </button>
                {saveFeedback && (
                  <span style={{
                    fontSize: 13.5,
                    fontWeight: 600,
                    color: saveFeedback.includes("successfully") ? GO_GREEN : NO_RED,
                    fontFamily: "'Lato', sans-serif"
                  }}>
                    {saveFeedback}
                  </span>
                )}
              </div>

            </div>
          </div>
        )}

        {/* Disclaimer */}
        <div style={{ textAlign: "center", fontSize: 11, color: "#A09080", fontStyle: "italic", marginTop: 32, lineHeight: 1.5 }}>
          Disclaimer: Leisure occupancy projections and displacement calculations are predictive point estimates generated by statistical models. Actual results may vary based on market conditions, and assessments should be utilized as strategic decision-making support.
        </div>
      </div>

      <div style={{ textAlign:"center", padding:"28px", color:`${LANG_PINK}50`, fontSize:12,
        letterSpacing:3, fontFamily:"'Playfair Display',serif", fontStyle:"italic", textTransform:"uppercase" }}>
        The Langham, Pasadena · Event Profitability + Displacement Suite · Confidential
      </div>

      {/* Sales Rep Entry Modal */}
      {!repName && (
        <div style={{
          position: "fixed",
          top: 0,
          left: 0,
          width: "100%",
          height: "100%",
          backgroundColor: "rgba(44, 36, 32, 0.8)",
          backdropFilter: "blur(8px)",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          zIndex: 10000,
        }}>
          <div style={{
            background: LANG_IVORY,
            border: `2px solid ${LANG_GOLD}`,
            borderRadius: 16,
            padding: "40px 48px",
            maxWidth: 450,
            width: "90%",
            boxShadow: "0 20px 40px rgba(0,0,0,0.3)",
            textAlign: "center",
            fontFamily: "'Lato', sans-serif"
          }}>
            <div style={{ fontSize: 11, letterSpacing: 4, color: LANG_PINK, textTransform: "uppercase", marginBottom: 12, fontWeight: 600, fontFamily: "'Playfair Display', serif" }}>
              The Langham, Pasadena
            </div>
            <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 26, color: LANG_DARK2, margin: "0 0 24px 0", fontWeight: 600, letterSpacing: 1 }}>
              Welcome back
            </h2>
            <p style={{ fontSize: 14, color: LANG_MID, margin: "0 0 28px 0", lineHeight: 1.6 }}>
              Please enter your Sales Representative Name to access your personal dashboard and booking logs.
            </p>
            <input 
              type="text"
              placeholder="e.g. Eleanor Vance"
              id="rep-name-input"
              style={{
                width: "100%",
                padding: "14px 18px",
                border: `1.5px solid ${LANG_BORDER}`,
                borderRadius: 8,
                fontSize: 15,
                color: LANG_DARK,
                background: "#fff",
                outline: "none",
                textAlign: "center",
                marginBottom: 20,
                boxSizing: "border-box",
                fontFamily: "'Lato', sans-serif"
              }}
              onKeyDown={(e) => {
                if (e.key === "Enter" && e.target.value.trim()) {
                  handleSaveRepName(e.target.value.trim());
                }
              }}
            />
            <button 
              onClick={() => {
                const val = document.getElementById("rep-name-input")?.value?.trim();
                if (val) {
                  handleSaveRepName(val);
                }
              }}
              style={{
                width: "100%",
                padding: "14px 20px",
                background: LANG_PINK,
                color: "#fff",
                border: "none",
                borderRadius: 8,
                fontSize: 14,
                fontWeight: 700,
                letterSpacing: 2,
                textTransform: "uppercase",
                cursor: "pointer",
                transition: "background 0.2s",
                fontFamily: "'Lato', sans-serif"
              }}
            >
              Enter Suite
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// Mount the React application to the DOM and remove loading spinner
const rootEl = document.getElementById('root');
if (rootEl) {
  const root = ReactDOM.createRoot(rootEl);
  root.render(
    <React.StrictMode>
      <HotelProfitabilityTool />
    </React.StrictMode>
  );
  
  // Smooth fade out of loading screen
  const loader = document.getElementById('loading-screen');
  if (loader) {
    loader.style.opacity = 0;
    setTimeout(() => {
      loader.remove();
    }, 500);
  }
}


  </script>

  <!-- Fallback: automatically remove loading screen if Babel compilation takes too long -->
  <script>
    setTimeout(function() {
      var loader = document.getElementById('loading-screen');
      if (loader) {
        console.warn("Babel compilation or React mounting timed out. Removing loading screen via local fallback script.");
        loader.style.opacity = 0;
        setTimeout(function() {
          if (loader.parentNode) {
            loader.remove();
          }
        }, 500);
      }
    }, 4000);
  </script>
</body>
</html>
